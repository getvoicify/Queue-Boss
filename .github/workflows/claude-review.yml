name: Claude Review

# Primary PR quality gate. Claude reviews the latest head of every non-draft PR
# to main, posts inline comments, and submits a formal APPROVE / REQUEST_CHANGES
# review. The `claude-review` job is wired into the main branch ruleset as a
# REQUIRED status check: it goes red whenever Claude requests changes (or fails
# to produce a verdict), so an unresolved review blocks merge.
#
# Enforcement is fail-closed: a missing verdict => red check.
# Replicated from getvoicify/gangan-api's claude-review.yml, re-scoped to the
# Rust/Angular/Tauri stack. Fork PRs skip this job (they cannot read secrets);
# the fork-PR gating gap is documented in .claude/epic.yaml `merge.notes`.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write # required by claude-code-action for its OIDC token exchange (even with API-key auth)

jobs:
  claude-review:
    # Skip fork PRs (they cannot read secrets) and draft PRs (don't burn tokens on WIP).
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so the action can diff against base
          persist-credentials: false

      - name: Reset verdict file
        run: |
          if git ls-files --error-unmatch claude-verdict.txt >/dev/null 2>&1; then
            echo "::error::claude-verdict.txt must not be committed to the repo"
            exit 1
          fi
          rm -f claude-verdict.txt

      - name: Claude review
        uses: anthropics/claude-code-action@4d7e1f0cd85743fdc93b1c8040ab54395da024e2 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "marco-cto,dependabot"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE: ${{ github.event.pull_request.base.ref }}

            You are the PRIMARY quality gate for this pull request. The PR branch
            is already checked out in the working directory. This is a Tauri 2
            desktop app: a Rust Cargo WORKSPACE behind an Angular 20 SPA in the
            webview.

            Review the diff (`gh pr diff ${{ github.event.pull_request.number }}`)
            against:
            - This repo's CLAUDE.md conventions (read it from the checkout root).
            - Any spec/runbook this PR references (inspect the PR body and linked
              issue via `gh pr view ${{ github.event.pull_request.number }}`).
            - Correctness and logic bugs, security implications, and adherence to
              existing repo patterns.

            Stack-specific rules you MUST enforce:
            - Outside-in TDD is NON-NEGOTIABLE. New or changed behavior needs a
              test written FIRST that failed for the right reason (red), then the
              minimal change to green. New behavior with no guarding test that the
              PR body names => REQUEST_CHANGES. Tests are the documentation of
              record; keep code comments minimal.
            - Rust Cargo workspace boundaries: `qb-core` (QueueBackend trait +
              domain model, platform-agnostic) must not depend on `qb-backends`
              or `qb-platform`; OS-specific seams live in `qb-platform`. The
              QueueBackend trait is a READ-ONLY view of the queue in Epic 1 — no
              write-path (enqueue/mutate) leakage into the trait or its callers.
              `cargo mutants` is the teeth behind TDD: surviving mutants on new
              Rust logic must be killed by a test or explicitly justified.
            - Strictly-declarative Angular: presentational components are DUMB —
              zero business logic, state flows IN via signals/inputs and events
              OUT via outputs. ALL Tauri access (`invoke`) is confined to the
              interface service — a direct `invoke()` outside it, or a data
              service injected into a presentational component => REQUEST_CHANGES.
              App/presentation state belongs in facades; presentational logic in
              directives/pipes.
            - Conventional Commits with NO AI-attribution trailers (no
              `Co-Authored-By: Claude` / "Generated with" lines in commits or the
              PR body).

            Post specific issues as inline comments with
            mcp__github_inline_comment__create_inline_comment (confirmed: true).

            Then decide a verdict and act on it:
            - Clean, or only non-blocking nits => write the single word APPROVE to
              the file claude-verdict.txt in the repo root, then run:
              gh pr review ${{ github.event.pull_request.number }} --approve --body "<concise summary>"
            - ANY blocking problem (logic/security bug, missing tests for new
              behavior, a real convention violation) => write the single word
              REQUEST_CHANGES to claude-verdict.txt, then run:
              gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<what must change, concisely>"

            Be decisive and honest: a genuine blocking problem MUST be
            REQUEST_CHANGES. Do not approve to be agreeable. Always write
            claude-verdict.txt exactly once with exactly one of those two words.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Read,Grep,Glob,Write,mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(cat:*),Bash(ls:*)"

      - name: Enforce verdict (fail closed)
        if: always()
        run: |
          verdict="$(tr -d '[:space:]' < claude-verdict.txt 2>/dev/null)"
          echo "Claude verdict: '${verdict:-<none>}'"
          if [ "$verdict" = "APPROVE" ]; then
            echo "✅ Claude approved this PR."
            exit 0
          fi
          echo "❌ Claude requested changes (or wrote no verdict)."
          echo "This required check stays red until Claude approves the latest head."
          exit 1
