name: CI

# Per-PR quality + Linux build gate. Job/matrix names are load-bearing:
# they are wired into main's branch protection as required checks
# (see .claude/epic.yaml `merge.required_checks`). GitHub reports the matrix
# `build` job per-OS as `build (ubuntu-latest)`, so this file's job ids MUST NOT
# drift. As of 2026-07-22 (issue #14) PRs gate on Linux only; the macOS/Windows
# 3-OS build moved to the change-gated nightly (.github/workflows/nightly-crossplatform.yml).
# `build` is kept a single-element matrix (NOT a plain job) so the check name
# stays `build (ubuntu-latest)`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            build-essential

      - run: npm ci

      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            build-essential

      - run: npm ci

      - run: npm run test:ci

      - name: Pre-pull the Postgres testcontainer image
        # testcontainers-modules 0.15 `Postgres::default()` pulls postgres:11-alpine;
        # pull it up front with retries so a transient Docker Hub timeout doesn't
        # flake the integration step (the tests then reuse the cached image). Keep
        # this tag in sync with the testcontainers-modules Postgres default.
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if docker pull postgres:11-alpine; then
              echo "pulled postgres:11-alpine on attempt $attempt"
              break
            fi
            echo "docker pull attempt $attempt failed; retrying in 15s" >&2
            sleep 15
          done
          docker image inspect postgres:11-alpine >/dev/null 2>&1 \
            || { echo "postgres:11-alpine still not present after 5 attempts" >&2; exit 1; }

      # Feature-gated testcontainer suite (Docker is present on ubuntu runners).
      # `set -o pipefail` makes a RED cargo run fail the step despite the tee;
      # the sentinel grep additionally catches a silent "feature off -> 0 tests".
      - name: pg-boss integration tests
        shell: bash
        run: |
          set -o pipefail
          cargo test -p qb-backends --features pg-integration -- --nocapture 2>&1 | tee pg_it.log
          grep -q 'pg_integration_sentinel ... ok' pg_it.log || { echo 'PG integration tests did not run (feature off?)'; exit 1; }
          cargo test -p queue-boss --features pg-integration -- --nocapture 2>&1 | tee pg_it_queue_boss.log
          grep -q 'pg_integration_sentinel ... ok' pg_it_queue_boss.log || { echo 'queue-boss PG integration tests did not run (feature off?)'; exit 1; }

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            build-essential

      - run: npm ci

      - run: npm run tauri:build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            build-essential \
            webkit2gtk-driver \
            xvfb

      - run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Build the app binary
        run: npm run tauri:build -- --no-bundle

      - name: Run e2e (headless under xvfb)
        run: WDIO_TAURI_PROVIDER=external xvfb-run -a npm run e2e
